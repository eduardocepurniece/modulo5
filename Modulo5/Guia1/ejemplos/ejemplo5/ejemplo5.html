<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="hrml, etiquetas, texto">
    <title>Agregando vínvulos e imágenes</title>
</head>
<body>
    <h1>Ejemplo de vínculos e imágenes</h1>
    <!-- Vínculo-->
  
    <h2></h2>
    <p>visita nuestra página favorita:
        <a href="https://oregoom.com/html/base/#" target="_blank">Ir a Ejemplo.com</a>
    </p>
    
    <!--Imagen-->
    <p>Esta es una imagen de ejemplo:</p>
    <img src="../../img/banana.jpeg" alt="Imagen de ejemplo" width="300">


    <!--Combinacion: Imagen como enlace-->
    <p>Haz clic en la imagen para ir a la página:</p>
    <a href="https://todosobrefrutas.com/frutas/" target="_blank">
        <img src="../../img/banana.jpeg" alt="Imagen de ejemplo" width="300">
    </a>  
    <p><abbr title="HyperText Markup Language">HTML</abbr> es un lenguaje de marcado.</p>
</body>

</html>
